defaults:
  - task: metaworld_mt50
  - algo: data_collect
  - _self_

algo:
  name: data_collection

exp_name: collect
variant_name: ${task.benchmark_name}
seed: 10000
device: cuda:0
output_prefix: outputs
data_prefix: data
make_unique_experiment_dir: true

rollout:
  enabled: true
  rollouts_per_env: ${task.demos_per_env}
  max_episode_length: ${task.horizon}
