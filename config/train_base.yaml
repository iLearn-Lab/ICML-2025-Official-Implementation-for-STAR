defaults:
  - task: metaworld_mt50
  - algo: star
  - _self_

output_prefix: outputs
data_prefix: data

exp_name: default
variant_name: null
seed: 10000
device: cuda:0
stage: null  # set by stage-specific configs such as train_rarsq / train_cst
make_unique_experiment_dir: true
logging_folder: training

checkpoint_path: null

train_dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 128
  shuffle: false
  num_workers: 6
  persistent_workers: false
  pin_memory: true
  multiprocessing_context: fork
  drop_last: true

training:
  n_epochs: 100
  grad_clip: 100.
  save_interval: 10
  log_interval: 100
  use_amp: false
  use_tqdm: true
  do_profile: false
  save_all_checkpoints: false
  auto_continue: false
  load_obs: true
  max_train_batches: 0
  resume: false

rollout:
  enabled: false
  interval: 10
  rollouts_per_env: 1
  max_episode_length: ${task.horizon}
  n_video: 0
  num_parallel_envs: 1

logging:
  group: null
  mode: disabled
  project: star
  resume: true
  save_code: true
